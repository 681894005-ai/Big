<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อร่อยดี (Aroy-Dee) | Restaurant Order & POS Portal</title>

  <!-- Google tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3L6D461M11"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Configure Google Analytics (Measurement ID updated)
    gtag('config', 'G-3L6D461M11', {
      page_path: window.location.pathname,
    });
  </script>
  <!-- SEO Meta Tags -->
  <meta name="description" content="ระบบจัดการร้านอาหารและสั่งซื้ออาหารออนไลน์สำหรับลูกค้าและพนักงานหลังร้าน ครบวงจร ใช้งานง่าย รวดเร็ว">
  <!-- CSS Link -->
  <link rel="stylesheet" href="./style.css?v=4">
</head>
<body>
  
  <div id="app">
    <!-- Header -->
    <header>
      <a href="#" id="brand-logo" class="logo">
        <div class="logo-icon">🍲</div>
        Aroy<span>Dee</span>
      </a>
      
      <nav class="nav-links">
        <button id="nav-customer" class="nav-btn active" data-target="customer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          ดูเมนูอาหาร
        </button>
        <button id="nav-admin" class="nav-btn" data-target="admin">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          ระบบจัดการ POS
        </button>
      </nav>

      <div id="auth-status-container">
        <!-- Auth status injected here dynamically -->
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content">
      <!-- Pages will be rendered here dynamically -->
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 Aroy-Dee Restaurant. All Rights Reserved. (Repository 681894005)</p>
      <button id="btn-system-reset" style="margin-top: 10px; font-size: 0.75rem; padding: 0.35rem 0.75rem; border: 1px solid #ef4444; color: #ef4444; border-radius: 4px; font-weight: 600; cursor: pointer; background: transparent; transition: all 0.2s;">⚠️ รีเซ็ตข้อมูลแคช (Reset Cache & DB)</button>
    </footer>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var resetBtn = document.getElementById("btn-system-reset");
      if (resetBtn) {
        resetBtn.addEventListener("click", function() {
          if (confirm("คุณต้องการรีเซ็ตระบบและล้างข้อมูลแคชทั้งหมดหรือไม่? (ตะกร้าสินค้าและประวัติออเดอร์จะถูกล้างใหม่ทั้งหมด)")) {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = window.location.pathname + "?t=" + Date.now();
          }
        });
      }
    });
  </script>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Printing section for thermal receipts -->
  <div id="print-section"></div>

  <!-- Image Diagnostics Panel -->
  <div id="image-diagnostics" style="background:#1e293b; color:#f8fafc; padding:15px; margin:20px; border-radius:8px; font-family:monospace; border:1px solid #334155; font-size: 13px;">
    <h3 style="margin-bottom:8px;">🔍 Image File Diagnostics (Live Test)</h3>
    <ul id="diag-list" style="margin-left:20px; list-style-type:square; line-height: 1.6;"></ul>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var images = [
        "./assets/images/pad_thai.jpg",
        "./assets/images/tom_yum.jpg",
        "./assets/images/green_curry.jpg",
        "./assets/images/mango_sticky_rice.jpg",
        "./assets/images/thai_tea.jpg",
        "./assets/images/water.jpg"
      ];
      var list = document.getElementById("diag-list");
      images.forEach(function(url) {
        fetch(url)
          .then(function(res) {
            var li = document.createElement("li");
            li.style.color = res.ok ? "#10b981" : "#ef4444";
            li.innerHTML = "<strong>" + url + "</strong>: " + (res.ok ? "✅ Loaded (" + res.status + " " + res.statusText + ")" : "❌ Failed (" + res.status + " " + res.statusText + ")");
            list.appendChild(li);
          })
          .catch(function(err) {
            var li = document.createElement("li");
            li.style.color = "#ef4444";
            li.innerHTML = "<strong>" + url + "</strong>: ❌ Network Error (" + err.message + ")";
            list.appendChild(li);
          });
      });
    });
  </script>

  <!-- JavaScript Entry Point -->
  <script type="module" src="./app.js?v=4"></script>
</body>
</html>
